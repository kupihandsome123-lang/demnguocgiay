<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Pro - Milliseconds</title>
  <style>
    body {
      display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
      background: radial-gradient(circle, #24273d 0%, #11121a 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white; overflow: hidden;
    }
    .app-container {
      display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 400px;
    }
    
    /* Vòng tròn tiến trình */
    .circle-wrapper {
      position: relative; width: 260px; height: 260px; margin-bottom: 40px; cursor: pointer;
      transition: opacity 0.3s;
    }
    .circle-wrapper:active { transform: scale(0.98); }
    svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    .bg-circle { fill: none; stroke: #1e2235; stroke-width: 12; }
    .progress-circle {
      fill: none; stroke: #eebb4d; stroke-width: 12; stroke-linecap: round;
      stroke-dasharray: 722; stroke-dashoffset: 0; 
      transition: stroke-dashoffset 0.1s linear;
    }
    
    /* Khu vực chứa số (Đã được điều chỉnh) */
    .timer-text {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      color: #f9f5e8;
    }
    
    /* Số giây to hơn */
    #secDisplay {
      font-size: 7.5rem; /* Đã tăng kích thước lên */
      font-weight: bold;
      line-height: 1;
      transform: translateY(-5px); /* Canh lại vị trí cho đẹp với vòng tròn */
    }

    /* Số phần trăm giây nhỏ và nằm bên phải */
    #msDisplay {
      font-size: 2.5rem; /* Chữ nhỏ hơn số giây */
      font-weight: 600;
      color: #a0a5b5; /* Đổi màu nhạt hơn một chút */
      margin-left: 5px;
      transform: translateY(15px); /* Ép số nhỏ xuống ngang chân số to */
    }

    /* Khu vực Input */
    .input-group {
      display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; width: 80%;
    }
    .input-label {
      font-size: 0.8rem; font-weight: bold; color: #a0a5b5; margin-bottom: 10px; letter-spacing: 1px;
    }
    input[type="number"] {
      width: 100%; padding: 15px; background-color: #1e2235; border: 1px solid #2d3246;
      border-radius: 12px; color: white; font-size: 1.5rem; text-align: center; font-weight: bold;
