<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Pro Max - No Circle</title>
  <style>
    body {
      display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
      background: radial-gradient(circle, #24273d 0%, #11121a 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white; overflow: hidden; touch-action: none;
    }
    
    /* Menu góc phải - Bộ đếm phụ */
    .top-menu {
      position: absolute; top: 20px; right: 20px;
      display: flex; align-items: center; gap: 4px;
      background: rgba(30, 34, 53, 0.8);
      padding: 6px 12px; border-radius: 12px;
      border: 1px solid #2d3246;
      z-index: 10;
    }
    .top-menu label { font-size: 14px; color: #a0a5b5; font-weight: bold; margin-right: 4px; }
    
    .time-input-wrapper {
      display: flex; align-items: center; color: #eebb4d; font-size: 24px; font-weight: bold;
    }

    .top-menu input {
      background: transparent; border: none; color: #eebb4d;
      font-size: 24px; width: 35px; text-align: center;
      font-weight: bold; outline: none; padding: 0;
    }

    #secondBtn {
      width: auto; min-width: fit-content;
      padding: 8px 16px; margin-left: 10px;
      height: auto; font-size: 0.9rem;
      border-radius: 10px; flex: none;
      border: none; cursor: pointer; font-weight: bold; transition: all 0.2s;
    }

    /* Màn hình chính ở giữa - Đã loại bỏ vòng tròn */
    .app-container {
      display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 500px;
    }
    
    .timer-wrapper {
      position: relative; 
      width: 354px; 
      height: 200px; /* Giảm chiều cao vì không còn vòng tròn */
      margin-bottom: 20px; 
      display: flex; justify-content: center; align-items: center;
      cursor: pointer;
    }
    
    .timer-text {
      display: flex; justify-content: center; align-items: center;
      color: #f9f5e8; pointer-events: none;
    }
    
    #secDisplay { font-size: 8rem; font-weight: bold; line-height: 1; }
    #msDisplay { font-size: 2.5rem; font-weight: 600; color: #a0a5b5; margin-left: 12px; transform: translateY(25px); }

    .button-group { display: flex; gap: 15px; width: 80%; justify-content: center; }
    button { padding: 18px 30px; border: none; border-radius: 14px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.2s; color: white; }
    
    .btn-start { background: linear-gradient(135deg, #f5c453, #d99e32); color: #111; }
    .btn-pause { background: #c22955; color: white; }
    .btn-reset { background-color: #1e2235; border: 1px solid #2d3246; }
  </style>
</head>
<body>

  <div class="top-menu">
    <label>Time</label>
    <div class="time-input-wrapper">
      <input type="number" id="minInput" value="00" min="0" max="99" 
             oninput="this.value = this.value.slice(0,2)"
             onblur="this.value = this.value.padStart(2, '0')">
      <span>:</span>
      <input type="number" id="secInput" value="10" min="0" max="59" 
             oninput="this.value = this.value.slice(0,2)"
             onblur="this.value = this.value.padStart(2, '0')">
    </div>
    <button id="secondBtn" onclick="toggleSmallTimer()" class="btn-start">Start</button>
  </div>

  <div class="app-container">
    <div class="timer-wrapper" onclick="toggleMainTimer()">
      <div class="timer-text">
        <span id="secDisplay">20</span>
        <span id="msDisplay">00</span>
      </div>
    </div>

    <div class="button-group">
      <button id="mainBtn" class="btn-start" onclick="toggleMainTimer()">BẮT ĐẦU</button>
      <button class="btn-reset" onclick="resetMainTimer()">ĐẶT LẠI</button>
    </div>
  </div>

  <script>
    // Logic Bộ đếm chính (Ở giữa)
    let mainTime = 20000; 
    let mainInterval = null;

    // Logic Bộ đếm phụ (Góc phải)
    let smallInterval = null;
    let smallRemainingMs = 0;

    // --- XỬ LÝ BỘ ĐẾM PHỤ (GÓC PHẢI) ---
    function toggleSmallTimer() {
      const btn = document.getElementById('secondBtn');
      const minInp = document.getElementById('minInput');
      const secInp = document.getElementById('secInput');

      if (smallInterval) {
        clearInterval(smallInterval);
        smallInterval = null;
        btn.textContent = "Start";
        btn.className = "btn-start";
        minInp.disabled = secInp.disabled = false;
        return;
      }

      let m = parseInt(minInp.value) || 0;
      let s = parseInt(secInp.value) || 0;
      smallRemainingMs = (m * 60 + s) * 1000;

      if (smallRemainingMs <= 0) return;

      minInp.disabled = secInp.disabled = true;
      btn.textContent = "Stop";
      btn.className = "btn-pause";

      smallInterval = setInterval(() => {
        smallRemainingMs -= 100;
        if (smallRemainingMs <= 0) {
          clearInterval(smallInterval);
          smallInterval = null;
          minInp.value = "00"; secInp.value = "00";
          btn.textContent = "Start";
          btn.className = "btn-start";
          minInp.disabled = secInp.disabled = false;
        } else {
          let totalSec = Math.floor(smallRemainingMs / 1000);
          minInp.value = Math.floor(totalSec / 60).toString().padStart(2, '0');
          secInp.value = (totalSec % 60).toString().padStart(2, '0');
        }
      }, 100);
    }

    // --- XỬ LÝ BỘ ĐẾM CHÍNH (Ở GIỮA) ---
    function toggleMainTimer() {
      const btn = document.getElementById('mainBtn');
      if (mainInterval) {
        clearInterval(mainInterval);
        mainInterval = null;
        btn.textContent = "TIẾP TỤC";
        btn.className = "btn-start";
      } else {
        btn.textContent = "TẠM DỪNG";
        btn.className = "btn-pause";
        mainInterval = setInterval(() => {
          mainTime -= 10;
          if (mainTime <= 0) {
            mainTime = 0;
            clearInterval(mainInterval);
            mainInterval = null;
            btn.textContent = "BẮT ĐẦU";
            btn.className = "btn-start";
          }
          updateMainUI();
        }, 10);
      }
    }

    function updateMainUI() {
      const s = Math.floor(mainTime / 1000);
      const ms = Math.floor((mainTime % 1000) / 10);
      document.getElementById('secDisplay').textContent = s.toString().padStart(2, '0');
      document.getElementById('msDisplay').textContent = ms.toString().padStart(2, '0');
    }

    function resetMainTimer() {
      clearInterval(mainInterval);
      mainInterval = null;
      mainTime = 20000;
      updateMainUI();
      document.getElementById('mainBtn').textContent = "BẮT ĐẦU";
      document.getElementById('mainBtn').className = "btn-start";
    }

    updateMainUI();
  </script>
</body>
</html>
