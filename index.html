<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Pro</title>
  <style>
    body {
      display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
      background: radial-gradient(circle, #24273d 0%, #11121a 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white; overflow: hidden;
    }
    .app-container {
      display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 400px;
    }
    
    /* Vòng tròn tiến trình */
    .circle-wrapper {
      position: relative; width: 250px; height: 250px; margin-bottom: 40px; cursor: pointer;
      transition: opacity 0.3s;
    }
    .circle-wrapper:active { transform: scale(0.98); }
    svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    .bg-circle { fill: none; stroke: #1e2235; stroke-width: 12; }
    .progress-circle {
      fill: none; stroke: #eebb4d; stroke-width: 12; stroke-linecap: round;
      stroke-dasharray: 722; stroke-dashoffset: 0; 
      transition: stroke-dashoffset 0.1s linear;
    }
    
    /* Số đếm ở giữa */
    .timer-text {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      font-size: 6rem; font-weight: bold; color: #f9f5e8;
    }

    /* Khu vực Input */
    .input-group {
      display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; width: 80%;
    }
    .input-label {
      font-size: 0.8rem; font-weight: bold; color: #a0a5b5; margin-bottom: 10px; letter-spacing: 1px;
    }
    input[type="number"] {
      width: 100%; padding: 15px; background-color: #1e2235; border: 1px solid #2d3246;
      border-radius: 12px; color: white; font-size: 1.5rem; text-align: center; font-weight: bold;
      outline: none; box-sizing: border-box; transition: opacity 0.3s;
    }
    input[type="number"]:disabled { opacity: 0.5; }

    /* Khu vực Buttons */
    .button-group {
      display: flex; gap: 15px; width: 80%; justify-content: space-between;
    }
    button {
      flex: 1; padding: 15px 0; border: none; border-radius: 12px; font-size: 1rem;
      font-weight: bold; cursor: pointer; transition: all 0.2s; color: white;
    }
    button:active { transform: scale(0.95); }
    
    .btn-start { background: linear-gradient(135deg, #f5c453, #d99e32); color: #111; }
    .btn-pause { background: #c22955; }
    .btn-reset { background-color: #1e2235; border: 1px solid #2d3246; }
    .btn-reset:hover { background-color: #2d3246; }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="circle-wrapper" onclick="toggleTimer()" title="Bấm để Dừng/Chạy tiếp">
      <svg viewBox="0 0 250 250">
        <circle class="bg-circle" cx="125" cy="125" r="115"></circle>
        <circle class="progress-circle" id="progress" cx="125" cy="125" r="115"></circle>
      </svg>
      <div class="timer-text" id="display">0</div>
    </div>

    <div class="input-group">
      <div class="input-label">ĐẶT THỜI GIAN (GIÂY)</div>
      <input type="number" id="timeInput" value="10" min="1">
    </div>

    <div class="button-group">
      <button id="mainBtn" class="btn-start" onclick="handleMainAction()">BẮT ĐẦU</button>
      <button class="btn-reset" onclick="resetApp()">ĐẶT LẠI</button>
    </div>
  </div>

  <script>
    const circle = document.getElementById('progress');
    const display = document.getElementById('display');
    const input = document.getElementById('timeInput');
    const mainBtn = document.getElementById('mainBtn');
    const circleWrapper = document.querySelector('.circle-wrapper');
    
    // Chu vi vòng tròn (2 * PI * r) với r=115
    const circumference = 2 * Math.PI * 115;
    circle.style.strokeDasharray = circumference;

    let totalMs = 0;
    let currentMs = 0;
    let timerInterval = null;
    let isRunning = false;
    let hasStarted = false;
    let lastSpokenSecond = -1;
    let audioCtx;
    let selectedFemaleVoice = null;

    // --- CÀI ĐẶT GIỌNG NÓI & ÂM THANH ---
    function loadVoices() {
      if (!window.speechSynthesis) return;
      let voices = window.speechSynthesis.getVoices();
      selectedFemaleVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Samantha') || v.name.includes('Female') || v.name.includes('Google US'))) || voices.find(v => v.lang.includes('en'));
    }
    if (window.speechSynthesis) {
      window.speechSynthesis.onvoiceschanged = loadVoices;
      loadVoices();
    }

    function speak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const msg = new SpeechSynthesisUtterance(text);
      if (selectedFemaleVoice) msg.voice = selectedFemaleVoice;
      window.speechSynthesis.speak(msg);
    }

    function playBuzzer() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 1.2);
        gain.gain.setValueAtTime(1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.2);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 1.2);
      } catch (e) { console.log("Audio Error:", e); }
    }

    // --- LOGIC ĐỒNG HỒ ---
    function updateUI() {
      // Cập nhật số (hiển thị giây chẵn)
      let secondsLeft = Math.ceil(currentMs / 1000);
      display.textContent = secondsLeft;

      // Cập nhật vòng tròn
      let percentage = currentMs / totalMs;
      if (totalMs === 0) percentage = 0;
      circle.style.strokeDashoffset = circumference - (percentage * circumference);

      // Đọc báo giờ
      if (secondsLeft === 5 && lastSpokenSecond !== 5 && currentMs > 0) {
        speak("Five seconds left");
        lastSpokenSecond = 5;
      }
    }

    function initAudioContext() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function startTimer() {
      if (currentMs <= 0) return;
      initAudioContext();
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      
      isRunning = true;
      hasStarted = true;
      input.disabled = true;
      
      // Đổi nút thành Tạm Dừng
      mainBtn.textContent = "TẠM DỪNG";
      mainBtn.className = "btn-pause";
      circleWrapper.style.opacity = "1";

      let lastTime = Date.now();
      timerInterval = setInterval(() => {
        let now = Date.now();
        let delta = now - lastTime;
        lastTime = now;
        currentMs -= delta;

        if (currentMs <= 0) {
          currentMs = 0;
          stopTimer();
          updateUI();
          playBuzzer();
          setTimeout(() => speak("Time is up!"), 1000);
          
          // Trả nút về Bắt Đầu
          mainBtn.textContent = "BẮT ĐẦU";
          mainBtn.className = "btn-start";
          hasStarted = false;
          input.disabled = false;
        } else {
          updateUI();
        }
      }, 10);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      isRunning = false;
      mainBtn.textContent = "TIẾP TỤC"; // Hoặc giữ BẮT ĐẦU tuỳ bạn
      mainBtn.className = "btn-start";
      circleWrapper.style.opacity = "0.4"; // Làm mờ khi tạm dừng
      if (window.speechSynthesis) window.speechSynthesis.cancel();
    }

    // Xử lý nút chính (Bắt đầu / Tạm dừng / Tiếp tục)
    function handleMainAction() {
      let val = parseInt(input.value);
      if (isNaN(val) || val <= 0) return alert("Vui lòng nhập số hợp lệ!");

      if (!hasStarted) {
        // Bắt đầu mới hoàn toàn
        totalMs = val * 1000;
        currentMs = totalMs;
        lastSpokenSecond = -1;
      }

      if (isRunning) {
        stopTimer();
      } else {
        startTimer();
      }
    }

    // Bấm vào vòng tròn để play/pause
    function toggleTimer() {
      if (hasStarted && currentMs > 0) {
        if (isRunning) stopTimer();
        else startTimer();
      }
    }

    function resetApp() {
      stopTimer();
      let val = parseInt(input.value) || 10;
      totalMs = val * 1000;
      currentMs = totalMs;
      hasStarted = false;
      lastSpokenSecond = -1;
      
      input.disabled = false;
      mainBtn.textContent = "BẮT ĐẦU";
      mainBtn.className = "btn-start";
      circleWrapper.style.opacity = "1";
      
      updateUI();
    }

    // Khởi tạo ban đầu
    display.textContent = input.value;
  </script>
</body>
</html>
