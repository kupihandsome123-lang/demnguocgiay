<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Pro - Quick Control</title>
  <style>
    body {
      display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
      background: radial-gradient(circle, #24273d 0%, #11121a 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white; overflow: hidden; touch-action: none;
    }
    
    /* Menu Điều khiển nhanh góc phải */
    .top-menu {
      position: absolute; top: 20px; right: 20px;
      display: flex; align-items: center; gap: 10px;
      background: rgba(30, 34, 53, 0.9);
      padding: 10px 15px; border-radius: 16px;
      border: 1px solid #3d445d;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .top-menu label { font-size: 12px; color: #a0a5b5; font-weight: bold; margin-right: -5px; }
    
    .btn-qty {
      background: #2d3246; border: none; color: white;
      width: 32px; height: 32px; border-radius: 8px;
      font-size: 18px; font-weight: bold; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .btn-qty:active { background: #eebb4d; color: #111; }

    #minDisplayVal {
      font-size: 22px; width: 35px; text-align: center;
      font-weight: bold; color: #eebb4d;
    }

    .btn-quick-start {
      background: #eebb4d; border: none; color: #111;
      padding: 8px 15px; border-radius: 8px;
      font-size: 13px; font-weight: 800; cursor: pointer;
      text-transform: uppercase; margin-left: 5px;
    }
    .btn-quick-start.running { background: #c22955; color: white; }

    /* Nội dung chính */
    .app-container {
      display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 500px;
    }
    
    .timer-area {
      text-align: center; margin-bottom: 50px; cursor: pointer;
    }
    
    #timeDisplay {
      font-size: 10rem; font-weight: 800; line-height: 1; color: #f9f5e8;
      font-variant-numeric: tabular-nums;
    }

    #msDisplay {
      font-size: 3rem; font-weight: 600; color: #626a80; 
      margin-top: 10px; display: block;
    }

    .button-group {
      display: flex; gap: 15px; width: 80%;
    }
    .btn-reset {
      flex: 1; padding: 18px; background: #1e2235; border: 1px solid #2d3246;
      border-radius: 14px; color: #a0a5b5; font-size: 1.1rem; font-weight: bold;
      cursor: pointer; transition: 0.2s;
    }
    .btn-reset:active { transform: scale(0.95); background: #2d3246; }

    /* Trạng thái mờ khi dừng */
    .is-paused { opacity: 0.5; transition: 0.3s; }
  </style>
</head>
<body>

  <div class="top-menu">
    <label>MIN</label>
    <button class="btn-qty" onclick="changeMin(-1)">−</button>
    <span id="minDisplayVal">1</span>
    <button class="btn-qty" onclick="changeMin(1)">+</button>
    <button id="quickStartBtn" class="btn-quick-start" onclick="handleMainAction()">Start</button>
  </div>

  <div class="app-container">
    <div class="timer-area" id="displayArea" onclick="toggleTimer()">
      <div id="timeDisplay">01:00</div>
      <div id="msDisplay">00</div>
    </div>

    <div class="button-group">
      <button class="btn-reset" onclick="resetApp()">ĐẶT LẠI (RESET)</button>
    </div>
  </div>

  <script>
    const timeDisplay = document.getElementById('timeDisplay');
    const msDisplay = document.getElementById('msDisplay');
    const minValText = document.getElementById('minDisplayVal');
    const quickStartBtn = document.getElementById('quickStartBtn');
    const displayArea = document.getElementById('displayArea');

    let setMin = 1; 
    let currentMs = 60000;
    let timerInterval = null;
    let isRunning = false;
    let hasStarted = false;
    let audioCtx;

    // Thay đổi số phút
    function changeMin(val) {
      if (isRunning) return;
      setMin = Math.max(0, setMin + val);
      minValText.textContent = setMin;
      if (!hasStarted) {
        currentMs = setMin * 60 * 1000;
        updateUI();
      }
    }

    function updateUI() {
      let totalSeconds = Math.floor(currentMs / 1000);
      let m = Math.floor(totalSeconds / 60);
      let s = totalSeconds % 60;
      let ms = Math.floor((currentMs % 1000) / 10);
      
      timeDisplay.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      msDisplay.textContent = ms.toString().padStart(2, '0');
    }

    function handleMainAction() {
      if (!hasStarted) {
        currentMs = setMin * 60 * 1000;
        if (currentMs <= 0) return;
        hasStarted = true;
      }
      isRunning ? stopTimer() : startTimer();
    }

    function startTimer() {
      isRunning = true;
      quickStartBtn.textContent = "Stop";
      quickStartBtn.classList.add('running');
      displayArea.classList.remove('is-paused');

      let lastTime = Date.now();
      timerInterval = setInterval(() => {
        let now = Date.now();
        currentMs -= (now - lastTime);
        lastTime = now;

        if (currentMs <= 0) {
          currentMs = 0;
          finishTimer();
        }
        updateUI();
      }, 10);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      isRunning = false;
      quickStartBtn.textContent = "Start";
      quickStartBtn.classList.remove('running');
      displayArea.classList.add('is-paused');
    }

    function finishTimer() {
      clearInterval(timerInterval);
      isRunning = false;
      hasStarted = false;
      quickStartBtn.textContent = "Start";
      quickStartBtn.classList.remove('running');
      playBuzzer();
    }

    function resetApp() {
      stopTimer();
      hasStarted = false;
      currentMs = setMin * 60 * 1000;
      displayArea.classList.remove('is-paused');
      updateUI();
    }

    function toggleTimer() {
      if (hasStarted) isRunning ? stopTimer() : startTimer();
    }

    function playBuzzer() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 1);
      } catch (e) {}
    }

    // VUỐT ĐỂ RESTART
    let startY;
    document.addEventListener('touchstart', e => startY = e.touches[0].clientY, {passive: true});
    document.addEventListener('touchend', e => {
      if (Math.abs(e.changedTouches[0].clientY - startY) > 60) {
        resetApp();
        handleMainAction();
      }
    });

    updateUI();
  </script>
</body>
</html>
