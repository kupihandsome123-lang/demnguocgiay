<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Pro Max - Visible Input</title>
  <style>
    body {
      display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
      background: radial-gradient(circle, #24273d 0%, #11121a 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white; overflow: hidden; touch-action: none;
    }
    
    /* Menu góc phải */
    .top-menu {
      position: absolute; top: 20px; right: 20px;
      display: flex; align-items: center; gap: 4px;
      background: rgba(30, 34, 53, 0.8);
      padding: 6px 12px; border-radius: 12px;
      border: 1px solid #2d3246; z-index: 10;
    }
    .top-menu label { font-size: 14px; color: #a0a5b5; font-weight: bold; margin-right: 4px; }
    .time-input-wrapper { display: flex; align-items: center; color: #eebb4d; font-size: 24px; font-weight: bold; }
    .top-menu input {
      background: transparent; border: none; color: #eebb4d;
      font-size: 24px; width: 35px; text-align: center;
      font-weight: bold; outline: none; padding: 0;
    }
    #secondBtn {
      width: auto; padding: 8px 16px; margin-left: 10px;
      height: auto; font-size: 0.9rem; border-radius: 10px;
      border: none; cursor: pointer; font-weight: bold; transition: all 0.2s;
    }

    /* Màn hình chính */
    .app-container {
      display: flex; flex-direction: column; align-items: center; width: 100%;
    }
    
    .timer-wrapper {
      position: relative; 
      margin-bottom: 40px; 
      display: flex; justify-content: center; align-items: baseline;
    }
    
    /* Ô NHẬP LIỆU CHÍNH - BIẾN THÀNH SỐ HIỂN THỊ */
    #mainTimeInput {
      background: transparent;
      border: none;
      color: #f9f5e8;
      font-size: 18rem;
      font-weight: bold;
      width: 25rem; /* Độ rộng vừa đủ cho 2-3 chữ số */
      text-align: right;
      outline: none;
      font-family: inherit;
      line-height: 0.8;
      cursor: text;
    }

    /* Xóa mũi tên tăng giảm của input number */
    #mainTimeInput::-webkit-inner-spin-button, 
    #mainTimeInput::-webkit-outer-spin-button { 
      -webkit-appearance: none; margin: 0; 
    }

    #msDisplay { 
      font-size: 5rem; 
      font-weight: 600; 
      color: #a0a5b5; 
      margin-left: 20px;
      pointer-events: none;
    }

    .button-group { display: flex; gap: 15px; }
    button { padding: 15px 40px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.2s; color: white; }
    
    .btn-start { background: #eebb4d; color: #111; }
    .btn-pause { background: #c22955; color: white; }
    .btn-reset { background: rgba(30, 34, 53, 0.8); border: 1px solid #2d3246; color: #a0a5b5; }
  </style>
</head>
<body>

  <div class="top-menu">
    <label>Time</label>
    <div class="time-input-wrapper">
      <input type="number" id="minInput" value="00" min="0" max="99" oninput="this.value = this.value.slice(0,2)" onblur="this.value = this.value.padStart(2, '0')">
      <span>:</span>
      <input type="number" id="secInput" value="10" min="0" max="59" oninput="this.value = this.value.slice(0,2)" onblur="this.value = this.value.padStart(2, '0')">
    </div>
    <button id="secondBtn" onclick="toggleSmallTimer()" class="btn-start">Start</button>
  </div>

  <div class="app-container">
    <div class="timer-wrapper">
      <input type="number" id="mainTimeInput" value="20" oninput="updateMainFromInput()">
      <div id="msDisplay">00</div>
    </div>

    <div class="button-group">
      <button id="mainBtn" class="btn-start" onclick="toggleMainTimer()">BẮT ĐẦU</button>
      <button class="btn-reset" onclick="resetMainTimer()">ĐẶT LẠI</button>
    </div>
  </div>

  <script>
    let mainTime = 20000; 
    let mainInterval = null;
    let smallInterval = null;
    let smallRemainingMs = 0;

    // Cập nhật khi gõ trực tiếp vào số to
    function updateMainFromInput() {
      if (mainInterval) return;
      const input = document.getElementById('mainTimeInput');
      const val = parseInt(input.value) || 0;
      mainTime = val * 1000;
      // Không cần cập nhật textContent vì chính nó là input
    }

    // Timer phụ góc phải
    function toggleSmallTimer() {
      const btn = document.getElementById('secondBtn');
      const minInp = document.getElementById('minInput');
      const secInp = document.getElementById('secInput');

      if (smallInterval) {
        clearInterval(smallInterval);
        smallInterval = null;
        btn.textContent = "Start";
        btn.className = "btn-start";
        minInp.disabled = secInp.disabled = false;
        return;
      }

      let m = parseInt(minInp.value) || 0;
      let s = parseInt(secInp.value) || 0;
      smallRemainingMs = (m * 60 + s) * 1000;
      if (smallRemainingMs <= 0) return;

      minInp.disabled = secInp.disabled = true;
      btn.textContent = "Stop";
      btn.className = "btn-pause";

      smallInterval = setInterval(() => {
        smallRemainingMs -= 100;
        if (smallRemainingMs <= 0) {
          clearInterval(smallInterval);
          smallInterval = null;
          minInp.value = "00"; secInp.value = "00";
          btn.textContent = "Start";
          btn.className = "btn-start";
          minInp.disabled = secInp.disabled = false;
        } else {
          let totalSec = Math.floor(smallRemainingMs / 1000);
          minInp.value = Math.floor(totalSec / 60).toString().padStart(2, '0');
          secInp.value = (totalSec % 60).toString().padStart(2, '0');
        }
      }, 100);
    }

    // Timer chính ở giữa
    function toggleMainTimer() {
      const btn = document.getElementById('mainBtn');
      const input = document.getElementById('mainTimeInput');

      if (mainInterval) {
        clearInterval(mainInterval);
        mainInterval = null;
        btn.textContent = "TIẾP TỤC";
        btn.className = "btn-start";
        input.readOnly = false; // Cho phép sửa khi dừng
      } else {
        if (mainTime <= 0) return;
        btn.textContent = "TẠM DỪNG";
        btn.className = "btn-pause";
        input.readOnly = true; // Khóa input khi đang chạy
        
        mainInterval = setInterval(() => {
          mainTime -= 10;
          if (mainTime <= 0) {
            mainTime = 0;
            clearInterval(mainInterval);
            mainInterval = null;
            btn.textContent = "BẮT ĐẦU";
            btn.className = "btn-start";
            input.readOnly = false;
          }
          updateMainUI();
        }, 10);
      }
    }

    function updateMainUI() {
      const input = document.getElementById('mainTimeInput');
      const s = Math.floor(mainTime / 1000);
      const ms = Math.floor((mainTime % 1000) / 10);
      
      input.value = s; // Cập nhật giá trị số giây vào input
      document.getElementById('msDisplay').textContent = ms.toString().padStart(2, '0');
    }

    function resetMainTimer() {
      clearInterval(mainInterval);
      mainInterval = null;
      const input = document.getElementById('mainTimeInput');
      input.value = 20; 
      mainTime = 20000;
      input.readOnly = false;
      document.getElementById('msDisplay').textContent = "00";
      document.getElementById('mainBtn').textContent = "BẮT ĐẦU";
      document.getElementById('mainBtn').className = "btn-start";
    }
  </script>
</body>
</html>
