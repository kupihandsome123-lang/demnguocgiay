<script>
    let countdown;
    let savedSeconds = 0;
    
    // Dùng link âm thanh của Google cho chắc cốp, không lo bị lỗi mạng chặn
    const failSound = new Audio('https://actions.google.com/sounds/v1/alarms/buzzer_alarm.ogg');

    function speak(text) {
      window.speechSynthesis.cancel(); 
      const msg = new SpeechSynthesisUtterance();
      msg.text = text;
      msg.lang = 'en-US';
      window.speechSynthesis.speak(msg);
    }

    function runTimer(seconds) {
      clearInterval(countdown);
      const display = document.getElementById('timer');
      display.textContent = seconds;

      countdown = setInterval(() => {
        seconds--;
        display.textContent = seconds;

        if (seconds === 5) {
          speak("Five seconds left");
        }

        if (seconds <= 0) {
          clearInterval(countdown);
          
          // Phát tiếng chuông
          failSound.currentTime = 0;
          failSound.play();
          
          // Đợi chuông kêu 1.5 giây thì đọc chữ
          setTimeout(() => {
              speak("Time is up!");
          }, 1500); 
        }
      }, 1000);
    }

    function startTimer() {
      const inputField = document.getElementById('timeInput');
      let inputVal = inputField.value;
      
      if (!inputVal || inputVal <= 0) {
        alert('Please enter a valid number!');
        return;
      }
      
      // CHIÊU MỞ KHÓA ÂM THANH CHO TRÌNH DUYỆT
      failSound.play().then(() => {
        failSound.pause();
        failSound.currentTime = 0;
      }).catch(err => console.log("Chưa mở khóa được âm thanh:", err));

      window.speechSynthesis.cancel();
      savedSeconds = inputVal; 
      runTimer(savedSeconds);
    }

    function resetTimer() {
      window.speechSynthesis.cancel();
      failSound.pause();
      failSound.currentTime = 0;
      
      clearInterval(countdown);
      document.getElementById('timer').textContent = "00";
      document.getElementById('timeInput').value = "";
      savedSeconds = 0;
    }

    let touchStartX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
    document.addEventListener('touchend', e => {
      let touchEndX = e.changedTouches[0].screenX;
      if (Math.abs(touchEndX - touchStartX) > 50) {
        if (savedSeconds > 0) {
          window.speechSynthesis.cancel();
          failSound.pause();
          failSound.currentTime = 0;
          runTimer(savedSeconds);
        }
      }
    });
  </script>
