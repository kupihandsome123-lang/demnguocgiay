<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Đếm Ngược</title>
  <style>
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; margin: 0; background-color: #282c34; color: white; font-family: sans-serif;
      overflow: hidden; /* Chống cuộn trang khi vuốt */
    }
    #timer { font-size: 20rem; font-weight: bold; margin-bottom: 20px; color: #61dafb; }
    .controls { display: flex; gap: 10px; }
    input { padding: 10px; font-size: 1.2rem; width: 120px; text-align: center; border-radius: 8px; border: none; }
    button {
      padding: 10px 20px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; color: white;
    }
    .btn-start { background-color: #ff4757; }
    .btn-start:hover { background-color: #ff6b81; }
    .btn-reset { background-color: #747d8c; }
    .btn-reset:hover { background-color: #a4b0be; }
  </style>
</head>
<body>

  <div id="timer">00</div>
  
  <div class="controls">
    <input type="number" id="timeInput" placeholder="Nhập số giây..." min="1">
    <button class="btn-start" onclick="startTimer()">Bắt đầu</button>
    <button class="btn-reset" onclick="resetTimer()">Làm mới</button>
  </div>

  <script>
    let countdown;
    let savedSeconds = 0; // Lưu lại số giây để vuốt đếm lại
    
    // --- XỬ LÝ ĐỒNG HỒ ---
    function runTimer(seconds) {
      clearInterval(countdown);
      const display = document.getElementById('timer');
      display.textContent = seconds;

      countdown = setInterval(() => {
        seconds--;
        display.textContent = seconds;
        if (seconds <= 0) {
          clearInterval(countdown);
          display.textContent = "BÙM!";
        }
      }, 1000);
    }

    function startTimer() {
      let inputVal = document.getElementById('timeInput').value;
      if (!inputVal || inputVal <= 0) return alert('Nhập số lớn hơn 0 nhé!');
      savedSeconds = inputVal; 
      runTimer(savedSeconds);
    }

    function resetTimer() {
      clearInterval(countdown);
      document.getElementById('timer').textContent = "00";
      document.getElementById('timeInput').value = "";
      savedSeconds = 0;
    }

    // --- XỬ LÝ VUỐT NGANG (MOBILE) ---
    let touchStartX = 0;

    document.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
    });

    document.addEventListener('touchend', e => {
      let touchEndX = e.changedTouches[0].screenX;
      // Nếu vuốt ngang qua trái hoặc phải hơn 50px
      if (Math.abs(touchEndX - touchStartX) > 50) {
        if (savedSeconds > 0) {
          runTimer(savedSeconds); // Chạy lại đồng hồ
        }
      }
    });
  </script>

</body>
</html>
