<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Pro Max - Swipe to Restart</title>
  <style>
    body {
      display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
      background: radial-gradient(circle, #24273d 0%, #11121a 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white; overflow: hidden; touch-action: none;
    }
    
    /* Menu Phút ở góc phải */
    .top-menu {
      position: absolute; top: 20px; right: 20px;
      display: flex; align-items: center; gap: 8px;
      background: rgba(30, 34, 53, 0.8);
      padding: 8px 12px; border-radius: 12px;
      border: 1px solid #2d3246;
    }
    .top-menu label { font-size: 14px; color: #a0a5b5; font-weight: bold; }
    .top-menu input {
      background: transparent; border: none; color: #eebb4d;
      font-size: 24px; width: 40px; text-align: center;
      font-weight: bold; outline: none;
    }

    .app-container {
      display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 500px;
    }
    
    .circle-wrapper {
      position: relative; width: 354px; height: 354px; margin-bottom: 40px; cursor: pointer;
      transition: opacity 0.3s, transform 0.1s;
    }
    .circle-wrapper:active { transform: scale(0.96); }
    
    svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    .bg-circle { fill: none; stroke: #1e2235; stroke-width: 16; }
    .progress-circle {
      fill: none; stroke: #eebb4d; stroke-width: 16; stroke-linecap: round;
      stroke-dasharray: 1036; stroke-dashoffset: 0; 
      transition: stroke-dashoffset 0.1s linear;
    }
    
    .timer-text {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      color: #f9f5e8; pointer-events: none;
    }
    
    #secDisplay {
      font-size: 8rem; /* Giảm nhẹ để vừa định dạng 00:00 */
      font-weight: bold; line-height: 1; transform: translateY(-5px);
    }

    #msDisplay {
      font-size: 2.5rem; font-weight: 600; color: #a0a5b5; 
      margin-left: 8px; transform: translateY(22px);
    }

    .input-group {
      display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; width: 80%;
    }
    .input-label {
      font-size: 0.9rem; font-weight: bold; color: #a0a5b5; margin-bottom: 10px; letter-spacing: 1px;
    }
    input[type="number"]::-webkit-inner-spin-button { display: none; }
    #timeInput {
      width: 100%; padding: 15px; background-color: #1e2235; border: 1px solid #2d3246;
      border-radius: 14px; color: white; font-size: 1.8rem; text-align: center; font-weight: bold;
      outline: none; box-sizing: border-box; transition: opacity 0.3s;
    }

    .button-group {
      display: flex; gap: 15px; width: 80%; justify-content: space-between;
    }
    button {
      flex: 1; padding: 18px 0; border: none; border-radius: 14px; font-size: 1.1rem;
      font-weight: bold; cursor: pointer; transition: all 0.2s; color: white;
    }
    button:active { transform: scale(0.95); }
    
    .btn-start { background: linear-gradient(135deg, #f5c453, #d99e32); color: #111; }
    .btn-pause { background: #c22955; }
    .btn-reset { background-color: #1e2235; border: 1px solid #2d3246; }
  </style>
</head>
<body>

  <div class="top-menu">
    <label>MIN</label>
    <input type="number" id="minInput" value="0" min="0" max="99" oninput="updateInitialDisplay()">
  </div>

  <div class="app-container">
    <div class="circle-wrapper" onclick="toggleTimer()" id="touchArea">
      <svg viewBox="0 0 354 354">
        <circle class="bg-circle" cx="177" cy="177" r="165"></circle>
        <circle class="progress-circle" id="progress" cx="177" cy="177" r="165"></circle>
      </svg>
      <div class="timer-text">
        <span id="secDisplay">00:10</span>
        <span id="msDisplay">00</span>
      </div>
    </div>

    <div class="input-group">
      <div class="input-label">GIÂY</div>
      <input type="number" id="timeInput" value="10" min="0" max="59" oninput="updateInitialDisplay()">
    </div>

    <div class="button-group">
      <button id="mainBtn" class="btn-start" onclick="handleMainAction()">BẮT ĐẦU</button>
      <button class="btn-reset" onclick="resetApp()">ĐẶT LẠI</button>
    </div>
  </div>

  <script>
    const circle = document.getElementById('progress');
    const secDisplay = document.getElementById('secDisplay');
    const msDisplay = document.getElementById('msDisplay');
    const inputSec = document.getElementById('timeInput');
    const inputMin = document.getElementById('minInput');
    const mainBtn = document.getElementById('mainBtn');
    const circleWrapper = document.getElementById('touchArea');
    
    const circumference = 2 * Math.PI * 165;
    circle.style.strokeDasharray = circumference;

    let totalMs = 0, currentMs = 0, timerInterval = null;
    let isRunning = false, hasStarted = false, lastSpokenSecond = -1;
    let audioCtx, selectedFemaleVoice = null;

    function loadVoices() {
      if (!window.speechSynthesis) return;
      let voices = window.speechSynthesis.getVoices();
      selectedFemaleVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Samantha') || v.name.includes('Google US'))) || voices.find(v => v.lang.includes('en'));
    }
    if (window.speechSynthesis) {
      window.speechSynthesis.onvoiceschanged = loadVoices;
      loadVoices();
    }

    function speak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const msg = new SpeechSynthesisUtterance(text);
      if (selectedFemaleVoice) msg.voice = selectedFemaleVoice;
      window.speechSynthesis.speak(msg);
    }

    function playBuzzer() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 1.2);
        gain.gain.setValueAtTime(1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.2);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 1.2);
      } catch (e) { console.log(e); }
    }

    function updateInitialDisplay() {
      if (!hasStarted) {
        let m = parseInt(inputMin.value) || 0;
        let s = parseInt(inputSec.value) || 0;
        secDisplay.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        msDisplay.textContent = "00";
        circle.style.strokeDashoffset = 0;
      }
    }

    function updateUI() {
      let totalSeconds = Math.floor(currentMs / 1000);
      let m = Math.floor(totalSeconds / 60);
      let s = totalSeconds % 60;
      let hundredths = Math.floor((currentMs % 1000) / 10);
      
      secDisplay.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      msDisplay.textContent = hundredths.toString().padStart(2, '0');

      let percentage = currentMs / totalMs;
      circle.style.strokeDashoffset = circumference - (percentage * circumference);

      if (totalSeconds === 5 && lastSpokenSecond !== 5 && isRunning) {
        speak("Five seconds left");
        lastSpokenSecond = 5;
      }
    }

    function startTimer() {
      if (currentMs <= 0) return;
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      isRunning = true;
      hasStarted = true;
      inputSec.disabled = inputMin.disabled = true;
      
      mainBtn.textContent = "TẠM DỪNG";
      mainBtn.className = "btn-pause";
      circleWrapper.style.opacity = "1";

      let lastTime = Date.now();
      timerInterval = setInterval(() => {
        let now = Date.now();
        let delta = now - lastTime;
        lastTime = now;
        currentMs -= delta;

        if (currentMs <= 0) {
          currentMs = 0;
          finishTimer();
        } else {
          updateUI();
        }
      }, 10);
    }

    function finishTimer() {
      clearInterval(timerInterval);
      isRunning = false;
      updateUI();
      playBuzzer();
      setTimeout(() => speak("Time is up!"), 500);
      mainBtn.textContent = "BẮT ĐẦU";
      mainBtn.className = "btn-start";
      hasStarted = false;
      inputSec.disabled = inputMin.disabled = false;
    }

    function stopTimer() {
      clearInterval(timerInterval);
      isRunning = false;
      mainBtn.textContent = "TIẾP TỤC"; 
      mainBtn.className = "btn-start";
      circleWrapper.style.opacity = "0.5";
    }

    function handleMainAction() {
      if (!hasStarted) {
        let m = parseInt(inputMin.value) || 0;
        let s = parseInt(inputSec.value) || 0;
        totalMs = (m * 60 + s) * 1000;
        if (totalMs <= 0) return alert("Vui lòng nhập thời gian!");
        currentMs = totalMs;
        lastSpokenSecond = -1;
      }

      if (isRunning) stopTimer();
      else startTimer();
    }

    function toggleTimer() {
      if (hasStarted && currentMs > 0) {
        if (isRunning) stopTimer();
        else startTimer();
      }
    }

    function resetApp() {
      clearInterval(timerInterval);
      isRunning = false;
      hasStarted = false;
      inputSec.disabled = inputMin.disabled = false;
      mainBtn.textContent = "BẮT ĐẦU";
      mainBtn.className = "btn-start";
      circleWrapper.style.opacity = "1";
      updateInitialDisplay();
    }

    // VUỐT ĐỂ RESTART
    let startX, startY;
    document.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, {passive: true});

    document.addEventListener('touchend', e => {
      let diffX = Math.abs(e.changedTouches[0].clientX - startX);
      let diffY = Math.abs(e.changedTouches[0].clientY - startY);
      if (diffX > 50 || diffY > 50) {
        resetApp();
        handleMainAction(); // Tự chạy luôn cho máu
      }
    });

    updateInitialDisplay();
  </script>
</body>
</html>
