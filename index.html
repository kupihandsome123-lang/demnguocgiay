<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Minimalist Pro</title>
  <style>
    body {
      display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
      background: radial-gradient(circle, #1a1c2c 0%, #0d0e14 100%);
      font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; touch-action: none;
    }
    
    .app-container {
      display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 400px;
    }

    /* Khu vực hiển thị số lớn */
    .timer-display {
      text-align: center; margin-bottom: 40px; cursor: pointer;
    }
    #timeMain {
      font-size: 9rem; font-weight: 800; line-height: 1; color: #f9f5e8;
      text-shadow: 0 0 30px rgba(238, 187, 77, 0.2);
    }
    #msDisplay {
      font-size: 3rem; color: #626a80; font-weight: 600; margin-left: 10px;
    }

    /* Bộ điều khiển Phút */
    .minute-controls {
      display: flex; align-items: center; gap: 25px; margin-bottom: 50px;
    }
    .ctrl-btn {
      width: 60px; height: 60px; border-radius: 50%; border: 2px solid #2d3246;
      background: #1e2235; color: #eebb4d; font-size: 2rem; font-weight: bold;
      cursor: pointer; display: flex; justify-content: center; align-items: center;
      transition: all 0.2s;
    }
    .ctrl-btn:active { transform: scale(0.9); background: #eebb4d; color: #111; }
    .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .min-label {
      display: flex; flex-direction: column; align-items: center;
    }
    .min-value { font-size: 2.5rem; font-weight: bold; color: #eebb4d; min-width: 60px; text-align: center; }
    .min-text { font-size: 0.7rem; color: #a0a5b5; letter-spacing: 2px; margin-top: 5px; }

    /* Nút hành động */
    .button-group {
      display: flex; gap: 15px; width: 85%;
    }
    button.main-action {
      flex: 2; padding: 20px; border: none; border-radius: 18px; font-size: 1.2rem;
      font-weight: bold; cursor: pointer; transition: all 0.2s;
    }
    .btn-start { background: linear-gradient(135deg, #f5c453, #d99e32); color: #111; }
    .btn-pause { background: #c22955; color: white; }
    .btn-reset { flex: 1; background: #1e2235; color: #a0a5b5; border: 1px solid #2d3246; border-radius: 18px; cursor: pointer; }

    /* Hiệu ứng mờ khi tạm dừng */
    .paused { opacity: 0.5; }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="timer-display" id="displayArea" onclick="toggleTimer()">
      <div id="timeMain">00:00</div>
      <div id="msDisplay">00</div>
    </div>

    <div class="minute-controls">
      <button class="ctrl-btn" onclick="changeMin(-1)" id="minusBtn">−</button>
      <div class="min-label">
        <div class="min-value" id="currentMinSet">0</div>
        <div class="min-text">MINUTES</div>
      </div>
      <button class="ctrl-btn" onclick="changeMin(1)" id="plusBtn">+</button>
    </div>

    <div class="button-group">
      <button id="mainBtn" class="main-action btn-start" onclick="handleMainAction()">BẮT ĐẦU</button>
      <button class="btn-reset" onclick="resetApp()">RESET</button>
    </div>
  </div>

  <script>
    const timeMain = document.getElementById('timeMain');
    const msDisplay = document.getElementById('msDisplay');
    const minSetDisplay = document.getElementById('currentMinSet');
    const mainBtn = document.getElementById('mainBtn');
    const displayArea = document.getElementById('displayArea');
    const minusBtn = document.getElementById('minusBtn');
    const plusBtn = document.getElementById('plusBtn');

    let setMin = 1; // Mặc định 1 phút
    let currentMs = 60000;
    let timerInterval = null;
    let isRunning = false;
    let hasStarted = false;
    let audioCtx;

    // Cập nhật số phút cài đặt
    function changeMin(val) {
      if (isRunning) return;
      setMin = Math.max(0, setMin + val);
      minSetDisplay.textContent = setMin;
      if (!hasStarted) {
        currentMs = setMin * 60 * 1000;
        updateUI();
      }
    }

    function updateUI() {
      let totalSeconds = Math.floor(currentMs / 1000);
      let m = Math.floor(totalSeconds / 60);
      let s = totalSeconds % 60;
      let ms = Math.floor((currentMs % 1000) / 10);
      
      timeMain.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      msDisplay.textContent = ms.toString().padStart(2, '0');
    }

    function handleMainAction() {
      if (!hasStarted) {
        currentMs = setMin * 60 * 1000;
        if (currentMs <= 0) return alert("Hãy chọn ít nhất 1 phút!");
        hasStarted = true;
      }
      isRunning ? stopTimer() : startTimer();
    }

    function startTimer() {
      isRunning = true;
      mainBtn.textContent = "TẠM DỪNG";
      mainBtn.className = "main-action btn-pause";
      displayArea.classList.remove('paused');
      minusBtn.disabled = plusBtn.disabled = true;

      let lastTime = Date.now();
      timerInterval = setInterval(() => {
        let now = Date.now();
        currentMs -= (now - lastTime);
        lastTime = now;

        if (currentMs <= 0) {
          currentMs = 0;
          finishTimer();
        }
        updateUI();
      }, 10);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      isRunning = false;
      mainBtn.textContent = "TIẾP TỤC";
      mainBtn.className = "main-action btn-start";
      displayArea.classList.add('paused');
    }

    function finishTimer() {
      clearInterval(timerInterval);
      isRunning = false;
      hasStarted = false;
      mainBtn.textContent = "BẮT ĐẦU";
      mainBtn.className = "main-action btn-start";
      minusBtn.disabled = plusBtn.disabled = false;
      // Có thể thêm tiếng chuông ở đây nếu muốn
    }

    function resetApp() {
      stopTimer();
      hasStarted = false;
      currentMs = setMin * 60 * 1000;
      minusBtn.disabled = plusBtn.disabled = false;
      displayArea.classList.remove('paused');
      mainBtn.textContent = "BẮT ĐẦU";
      mainBtn.className = "main-action btn-start";
      updateUI();
    }

    function toggleTimer() {
      if (hasStarted) isRunning ? stopTimer() : startTimer();
    }

    // VUỐT ĐỂ RESTART (Giữ nguyên tính năng Pro Max)
    let startY;
    document.addEventListener('touchstart', e => startY = e.touches[0].clientY, {passive: true});
    document.addEventListener('touchend', e => {
      if (Math.abs(e.changedTouches[0].clientY - startY) > 60) {
        resetApp();
        handleMainAction();
      }
    });

    // Khởi tạo
    minSetDisplay.textContent = setMin;
    updateUI();
  </script>
</body>
</html>
