<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Voice App</title>
  <style>
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; margin: 0; background-color: #282c34; color: white; font-family: sans-serif;
      overflow: hidden;
    }
    #timer { font-size: 15rem; font-weight: bold; margin-bottom: 20px; color: #61dafb; }
    .controls { display: flex; gap: 10px; }
    input { padding: 15px; font-size: 1.2rem; width: 140px; text-align: center; border-radius: 8px; border: none; }
    button {
      padding: 10px 25px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; color: white;
    }
    .btn-start { background-color: #4cd137; } /* Đổi màu xanh cho tươi mới */
    .btn-start:hover { background-color: #44bd32; }
    .btn-reset { background-color: #7f8c8d; }
    .btn-reset:hover { background-color: #95a5a6; }
  </style>
</head>
<body>

  <div id="timer">00</div>
  
  <div class="controls">
    <input type="number" id="timeInput" placeholder="Seconds..." min="1">
    <button class="btn-start" onclick="startTimer()">Start</button>
    <button class="btn-reset" onclick="resetTimer()">Reset</button>
  </div>

  <script>
    let countdown;
    let savedSeconds = 0;

    // Hàm phát âm tiếng Anh
    function speak(text) {
      const msg = new SpeechSynthesisUtterance();
      msg.text = text;
      msg.lang = 'en-US'; // Chuyển sang tiếng Anh Mỹ
      msg.rate = 1;       // Tốc độ đọc (1 là bình thường)
      msg.pitch = 1;      // Độ trầm bổng
      window.speechSynthesis.speak(msg);
    }

    function runTimer(seconds) {
      clearInterval(countdown);
      const display = document.getElementById('timer');
      display.textContent = seconds;

      countdown = setInterval(() => {
        seconds--;
        display.textContent = seconds;

        // Báo khi còn 5 giây
        if (seconds === 5) {
          speak("Five seconds left");
        }

        if (seconds <= 0) {
          clearInterval(countdown);
          display.textContent = "TIME UP!";
          speak("Time is up!"); 
        }
      }, 1000);
    }

    function startTimer() {
      let inputVal = document.getElementById('timeInput').value;
      if (!inputVal || inputVal <= 0) return alert('Please enter a valid number!');
      
      window.speechSynthesis.cancel(); 
      savedSeconds = inputVal; 
      runTimer(savedSeconds);
    }

    function resetTimer() {
      window.speechSynthesis.cancel();
      clearInterval(countdown);
      document.getElementById('timer').textContent = "00";
      document.getElementById('timeInput').value = "";
      savedSeconds = 0;
    }

    // VUỐT NGANG ĐỂ RESTART
    let touchStartX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
    document.addEventListener('touchend', e => {
      let touchEndX = e.changedTouches[0].screenX;
      if (Math.abs(touchEndX - touchStartX) > 50) {
        if (savedSeconds > 0) {
          window.speechSynthesis.cancel();
          runTimer(savedSeconds);
        }
      }
    });
  </script>

</body>
</html>
