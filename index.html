<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Pro Max - Poker Master Security</title>
  <style>
    body {
      display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
      background: radial-gradient(circle, #24273d 0%, #11121a 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white; overflow: hidden; touch-action: none;
    }

    /* --- KHỐI BÊN TRÁI: BẢNG LEVEL & ĐỀM NGƯỢC LV --- */
    .left-sidebar {
      position: absolute; top: 20px; left: 20px;
      display: flex; flex-direction: column; gap: 10px;
      z-index: 30;
    }

    .level-panel {
      background: rgba(30, 34, 53, 0.85);
      padding: 10px; border-radius: 12px 12px 0 0; /* Bo góc trên */
      border: 1px solid #2d3246;
      max-height: 400px; overflow-y: auto;
      width: 260px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    
    .level-panel::-webkit-scrollbar { width: 5px; }
    .level-panel::-webkit-scrollbar-thumb { background: #2d3246; border-radius: 10px; }

    .level-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; cursor: pointer; }
    .level-table th { 
      position: sticky; top: 0; background: #1e2235;
      color: #eebb4d; padding: 8px 2px; border-bottom: 1px solid #2d3246; 
    }
    .level-table td { padding: 8px 2px; color: #a0a5b5; border-bottom: 1px solid rgba(45, 50, 70, 0.3); transition: all 0.2s; }
    
    .break-row td { color: #4db8ff !important; font-style: italic; }

    .level-table tr.active-level { 
      background: rgba(238, 187, 77, 0.25); 
      outline: 2px solid #eebb4d;
    }
    .level-table tr.active-level td { color: #ffffff !important; font-weight: 800; text-shadow: 0 0 5px rgba(255, 255, 255, 0.3); }

    /* --- MENU ĐẾM NGƯỢC (Đã chuyển xuống dưới bảng LV) --- */
    .top-menu {
      display: flex; flex-direction: column; gap: 12px;
      background: rgba(30, 34, 53, 0.95);
      padding: 15px; border-radius: 0 0 12px 12px; /* Bo góc dưới */
      border: 1px solid #2d3246; border-top: none;
      width: 250px; /* Khớp với bảng level-panel */
    }
    .top-menu .group { display: flex; justify-content: space-between; align-items: center; }
    .top-menu label { font-size: 11px; color: #a0a5b5; font-weight: bold; text-transform: uppercase; }
    
    .time-input-wrapper { display: flex; align-items: center; color: #eebb4d; font-size: 24px; font-weight: bold; }
    
    .top-menu input {
      background: rgba(0,0,0,0.3); border: 1px solid #4a5068; color: #eebb4d;
      font-size: 20px; width: 50px; text-align: center;
      font-weight: bold; outline: none; border-radius: 6px; padding: 2px;
    }
    #levelDisplay { color: #ffffff; border-color: #eebb4d; }

    #secondBtn { width: 100%; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; margin-top: 5px; }

    /* --- MÀN HÌNH CHÍNH --- */
    .app-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
    .timer-wrapper {
      position: relative; margin-bottom: 40px; 
      display: flex; justify-content: center; align-items: baseline;
      cursor: pointer; padding: 20px; z-index: 5;
    }
    #mainTimeInput {
      background: transparent; border: none; color: #f9f5e8;
      font-size: 18rem; font-weight: bold; width: 25rem;
      text-align: right; outline: none; font-family: inherit; line-height: 0.8;
    }
    #msDisplay { font-size: 5rem; font-weight: 600; color: #a0a5b5; margin-left: 20px; pointer-events: none; }
    
    .button-group { display: flex; gap: 15px; z-index: 10; }
    button { padding: 15px 40px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.2s; color: white; }
    .btn-start { background: #eebb4d; color: #111; }
    .btn-pause { background: #c22955; color: white; }
    .btn-reset { background: rgba(30, 34, 53, 0.8); border: 1px solid #2d3246; color: #a0a5b5; }
  </style>
</head>
<body>

  <div class="left-sidebar">
    <div class="level-panel">
      <table class="level-table">
        <thead>
          <tr>
            <th>Lvl</th>
            <th>Small</th>
            <th>Big</th>
            <th>Ante</th>
          </tr>
        </thead>
        <tbody id="pokerLevelsContent"></tbody>
      </table>
    </div>

    <div class="top-menu">
      <div class="group">
        <label>Level Hiện Tại</label>
        <input type="text" id="levelDisplay" value="1" oninput="manualLevelEntry()">
      </div>
      <div class="group">
        <label>Thời Gian</label>
        <div class="time-input-wrapper">
          <input type="number" id="minInput" value="00" oninput="this.value = this.value.slice(0,2)">
          <span>:</span>
          <input type="number" id="secInput" value="10" oninput="this.value = this.value.slice(0,2)">
        </div>
      </div>
      <button id="secondBtn" onclick="toggleSmallTimer()" class="btn-start">BẮT ĐẦU</button>
    </div>
  </div>

  <div class="app-container">
    <div class="timer-wrapper" id="mainTouchArea">
      <input type="number" id="mainTimeInput" value="20" oninput="updateMainFromInput()">
      <div id="msDisplay">00</div>
    </div>
    <div class="button-group">
      <button id="mainBtn" class="btn-start" onclick="toggleMainTimer()">BẮT ĐẦU</button>
      <button class="btn-reset" onclick="resetMainTimer()">ĐẶT LẠI</button>
    </div>
  </div>

  <script>
    // --- CHỨC NĂNG CHỐNG LOAD LẠI TRANG ---
    window.addEventListener('beforeunload', function (e) {
        e.preventDefault();
        e.returnValue = ''; 
    });

    const pokerLevels = [
      [1, 10, 10, 10], [2, 10, 20, 20], [3, 20, 40, 40], [4, 30, 60, 60], [5, 40, 80, 80],
      ["BK", "Break", "Time", "-"], 
      [6, 50, 100, 100], [7, 100, 200, 200], [8, 150, 300, 300], [9, 200, 400, 400], [10, 300, 600, 600],
      ["BK", "Break", "Time", "-"],
      [11, 400, 800, 800], [12, 500, 1000, 1000], [13, 600, 1200, 1200], [14, 800, 1600, 1600], [15, 1000, 2000, 2000],
      ["BK", "Break", "Time", "-"],
      [16, 1500, 3000, 3000], [17, 2000, 4000, 4000], [18, 3000, 6000, 6000], [19, 4000, 8000, 8000], [20, 5000, 10000, 10000],
      ["BK", "Break", "Time", "-"],
      [21, 6000, 12000, 12000], [22, 8000, 16000, 16000]
    ];

    let currentLevelIndex = 0;
    const tableBody = document.getElementById('pokerLevelsContent');

    pokerLevels.forEach((lvl, index) => {
      const row = document.createElement('tr');
      row.id = `level-row-${index}`;
      if (lvl[0] === "BK") row.className = "break-row";
      row.innerHTML = `<td>${lvl[0]}</td><td>${lvl[1]}</td><td>${lvl[2]}</td><td>${lvl[3]}</td>`;
      row.addEventListener('dblclick', () => {
        currentLevelIndex = index;
        updateLevelHighlight();
      });
      tableBody.appendChild(row);
    });

    function manualLevelEntry() {
      const inputVal = document.getElementById('levelDisplay').value.toUpperCase();
      const foundIndex = pokerLevels.findIndex(lvl => lvl[0].toString() === inputVal);
      if (foundIndex !== -1) {
        currentLevelIndex = foundIndex;
        updateLevelHighlight(false);
      }
    }

    function updateLevelHighlight(updateInput = true) {
      document.querySelectorAll('.level-table tr').forEach(tr => tr.classList.remove('active-level'));
      const activeRow = document.getElementById(`level-row-${currentLevelIndex}`);
      if (activeRow) {
        activeRow.classList.add('active-level');
        activeRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
        if (updateInput) {
          document.getElementById('levelDisplay').value = pokerLevels[currentLevelIndex][0];
        }
      }
    }

    let mainTime = 20000, mainInterval = null, smallInterval = null, smallRemainingMs = 0;
    const mainInput = document.getElementById('mainTimeInput');

    function toggleSmallTimer() {
      const btn = document.getElementById('secondBtn');
      const minInp = document.getElementById('minInput'), secInp = document.getElementById('secInput');
      const lvlInp = document.getElementById('levelDisplay');

      if (smallInterval) {
        clearInterval(smallInterval); smallInterval = null;
        btn.textContent = "BẮT ĐẦU LV"; btn.className = "btn-start";
        minInp.disabled = secInp.disabled = lvlInp.disabled = false;
        return;
      }

      const initialMs = ((parseInt(minInp.value) || 0) * 60 + (parseInt(secInp.value) || 0)) * 1000;
      smallRemainingMs = initialMs;
      if (smallRemainingMs <= 0) return alert("Nhập thời gian!");

      minInp.disabled = secInp.disabled = lvlInp.disabled = true;
      btn.textContent = "DỪNG LV"; btn.className = "btn-pause";
      updateLevelHighlight();

      smallInterval = setInterval(() => {
        smallRemainingMs -= 100;
        if (smallRemainingMs <= 0) {
          if (currentLevelIndex < pokerLevels.length - 1) {
            currentLevelIndex++;
            updateLevelHighlight();
            smallRemainingMs = initialMs; 
          } else {
            clearInterval(smallInterval); smallInterval = null;
            btn.textContent = "BẮT ĐẦU LV"; btn.className = "btn-start";
            minInp.disabled = secInp.disabled = lvlInp.disabled = false;
            alert("Kết thúc giải đấu!");
          }
        } else {
          let totalSec = Math.ceil(smallRemainingMs / 1000);
          minInp.value = Math.floor(totalSec / 60).toString().padStart(2, '0');
          secInp.value = (totalSec % 60).toString().padStart(2, '0');
        }
      }, 100);
    }

    document.getElementById('mainTouchArea').addEventListener('click', (e) => {
      if (mainInterval) toggleMainTimer();
      else { if (e.target === mainInput) mainInput.focus(); else toggleMainTimer(); }
    });
    function updateMainFromInput() { if (!mainInterval) mainTime = (parseInt(mainInput.value) || 0) * 1000; }
    function toggleMainTimer() {
      const btn = document.getElementById('mainBtn');
      if (mainInterval) {
        clearInterval(mainInterval); mainInterval = null;
        btn.textContent = "TIẾP TỤC"; btn.className = "btn-start";
        mainInput.style.pointerEvents = "auto"; 
      } else {
        if (mainTime <= 0) return;
        btn.textContent = "TẠM DỪNG"; btn.className = "btn-pause";
        mainInput.style.pointerEvents = "none"; mainInput.blur();
        mainInterval = setInterval(() => {
          mainTime -= 10;
          if (mainTime <= 0) { mainTime = 0; clearInterval(mainInterval); mainInterval = null; btn.textContent = "BẮT ĐẦU"; btn.className = "btn-start"; mainInput.style.pointerEvents = "auto"; }
          updateMainUI();
        }, 10);
      }
    }
    function updateMainUI() {
      mainInput.value = Math.floor(mainTime / 1000);
      document.getElementById('msDisplay').textContent = Math.floor((mainTime % 1000) / 10).toString().padStart(2, '0');
    }
    function resetMainTimer() {
      clearInterval(mainInterval); mainInterval = null;
      mainTime = 20000; updateMainUI();
      document.getElementById('mainBtn').textContent = "BẮT ĐẦU";
      document.getElementById('mainBtn').className = "btn-start";
      mainInput.style.pointerEvents = "auto";
    }
    let touchStartX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
    document.addEventListener('touchend', e => {
      if (Math.abs(e.changedTouches[0].screenX - touchStartX) > 100) { resetMainTimer(); toggleMainTimer(); }
    }, false);

    updateLevelHighlight();
  </script>
</body>
</html>
