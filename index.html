<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Voice App - New UI</title>
  <style>
    :root {
      --bg-color: #0d111c;
      --text-color: #f8f8f8;
      --accent-color: #f7b731; /* Màu vàng từ hình 1 */
      --danger-color: #ff1744; /* Màu hồng từ hình 2 */
      --control-bg: #1a1f30;
      --control-text: #b8c1ec;
      --font-family: sans-serif;
    }

    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; margin: 0;
      background: radial-gradient(circle at center, #1a233b 0%, #0d111c 100%);
      color: var(--text-color); font-family: var(--font-family);
      overflow: hidden; user-select: none;
    }

    /* Vòng đếm ngược (SVG Circular Progress) */
    .timer-container {
      position: relative; width: 300px; height: 300px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 50px;
    }

    .svg-timer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      transform: rotate(-90deg); /* Bắt đầu từ đỉnh 12h */
    }

    /* Vòng tròn cơ sở (xám) */
    .timer-circle-bg {
      fill: none; stroke: #2d344d; stroke-width: 15;
    }

    /* Vòng tròn tiến trình (vàng/hồng) */
    .timer-circle-progress {
      fill: none; stroke: var(--accent-color); stroke-width: 15;
      stroke-linecap: round; /* Bo góc đầu dòng */
      transition: stroke-dashoffset 0.1s linear, stroke 0.3s ease, opacity 0.3s ease;
      stroke-dasharray: 753.98; /* Chu vi = 2 * PI * r (r=120) */
      stroke-dashoffset: 753.98; /* Bắt đầu với offset đầy */
    }

    /* Số đếm ngược lớn ở trung tâm */
    #timer {
      font-size: 150px; font-weight: bold; color: var(--text-color);
      line-height: 1; transition: opacity 0.3s ease, transform 0.1s;
    }

    /* Phần trăm giây nhỏ bên phải */
    .ms-small {
      font-size: 40px; color: #8892b0;
      vertical-align: super; margin-left: 5px; opacity: 0.7;
    }

    /* Phần controls: label, input, button */
    .controls-container {
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      width: 100%; max-width: 400px;
    }

    .label-container {
      font-size: 16px; color: var(--control-text);
      text-transform: uppercase; letter-spacing: 1px;
    }

    #timeInput {
      width: 100%; padding: 25px; font-size: 32px; text-align: center;
      border-radius: 20px; border: 2px solid #2d344d; outline: none;
      background-color: var(--control-bg); color: var(--text-color);
      transition: border-color 0.3s, background-color 0.3s;
      box-shadow: inset 0 4px 6px rgba(0,0,0,0.4);
    }
    #timeInput:focus { border-color: var(--accent-color); background-color: #242942; }
    #timeInput:disabled { opacity: 0.5; cursor: not-allowed; }

    .button-group { display: flex; gap: 20px; width: 100%; margin-top: 10px; }

    button {
      flex: 1; padding: 25px 0; font-size: 20px; cursor: pointer; border: none;
      border-radius: 20px; font-weight: bold;
      transition: transform 0.1s, opacity 0.2s, background-color 0.3s;
      box-shadow: 0 6px 10px rgba(0,0,0,0.3);
      text-transform: uppercase; letter-spacing: 1px;
    }
    button:active { transform: scale(0.96); box-shadow: 0 3px 5px rgba(0,0,0,0.3); }
