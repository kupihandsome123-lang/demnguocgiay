<style>
  /* ... (giữ nguyên các phần cũ) ... */

  .top-menu {
    position: absolute; top: 20px; right: 20px;
    display: flex; align-items: center; gap: 4px; /* Giảm gap để sát nhau hơn */
    background: rgba(30, 34, 53, 0.8);
    padding: 6px 12px; border-radius: 12px;
    border: 1px solid #2d3246;
  }

  .top-menu label { font-size: 14px; color: #a0a5b5; font-weight: bold; margin-right: 4px; }

  /* Input cho Phút và Giây */
  .time-input-wrapper {
    display: flex; align-items: center; color: #eebb4d; font-size: 24px; font-weight: bold;
  }
  
  .top-menu input {
    background: transparent; border: none; color: #eebb4d;
    font-size: 24px; width: 32px; text-align: center;
    font-weight: bold; outline: none; padding: 0;
  }

  /* Nút Start "Hug content" */
  #secondBtn {
    width: auto; /* Tự động theo nội dung */
    min-width: fit-content;
    padding: 8px 16px; /* Tạo khoảng trống xung quanh chữ */
    margin-left: 8px;
    height: auto;
    font-size: 0.9rem;
  }
</style>

<div class="top-menu">
  <label>Time</label>
  <div class="time-input-wrapper">
    <input type="number" id="minInput" value="00" min="0" max="99" 
           oninput="this.value = this.value.slice(0,2); updateInitialDisplay()" 
           onblur="this.value = this.value.padStart(2, '0')">
    <span>:</span>
    <input type="number" id="timeInput" value="10" min="0" max="59" 
           oninput="this.value = this.value.slice(0,2); updateInitialDisplay()"
           onblur="this.value = this.value.padStart(2, '0')">
  </div>
  <button id="secondBtn" onclick="handleMainAction()" class="btn-start">Start</button>
</div>
